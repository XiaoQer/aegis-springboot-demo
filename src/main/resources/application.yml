spring:
  application:
    name: aegis-springboot-demo

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

app:
  environment: ${APP_ENVIRONMENT:local}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: Spring Boot delivery demo for Aegis
