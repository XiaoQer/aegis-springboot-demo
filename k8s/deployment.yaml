apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-springboot-demo
  labels:
    app.kubernetes.io/name: aegis-springboot-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aegis-springboot-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aegis-springboot-demo
    spec:
      containers:
        - name: application
          image: aegis-springboot-demo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_ENVIRONMENT
              value: kubernetes
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-springboot-demo
spec:
  selector:
    app.kubernetes.io/name: aegis-springboot-demo
  ports:
    - name: http
      port: 80
      targetPort: http
